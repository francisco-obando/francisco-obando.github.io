baseURL = 'https://francisco-obando.github.io/'
languageCode = 'en-us'
title = 'Francisco Obando | Data Engineer'
theme = 'PaperMod'

[params]
    env = 'production'
    description = "Senior Data Engineer specializing in Scalable Data Platforms, Cloud Infrastructure (AWS/GCP), and Event-Driven Architectures."
    author = "Francisco Obando"
    mainSections = ["posts", "projects", "ideas"]
    
    # Header label
    [params.label]
        text = "Francisco Obando"
        icon = "/logo.png"
        iconHeight = 35

    # Profile Mode (Home Page)
    [params.profileMode]
        enabled = true
        title = "Francisco Obando"
        subtitle = "Senior Data Engineer | AWS & GCP | Scalable Data Architectures"
        imageUrl = "/avatar.png"
        imageTitle = "Francisco Obando"
        imageWidth = 150
        imageHeight = 150
        buttons = [
            { name = "Projects", url = "/projects" },
            { name = "Resume", url = "/resume" },
            { name = "Posts", url = "/posts" }
        ]

    # Social Icons
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/francisco-obando"
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://linkedin.com/in/franciscoobando"
    [[params.socialIcons]]
        name = "email"
        url = "mailto:fran.obando@gmail.com"

    # Theme toggle & features
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowToc = true
    comments = false
    
    [params.editPost]
        URL = "https://github.com/francisco-obando/francisco-obando.github.io/blob/main/content"
        Text = "Suggest Changes"
        appendFilePath = true

    # Search
    [params.fuseConfig]
        isCaseSensitive = false
        shouldSort = true
        location = 0
        distance = 1000
        threshold = 0.4
        minMatchCharLength = 0
        keys = ["title", "permalink", "summary", "content"]

[menu]
    [[menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts"
        weight = 10
    [[menu.main]]
        identifier = "projects"
        name = "Projects"
        url = "/projects"
        weight = 20
    [[menu.main]]
        identifier = "ideas"
        name = "Ideas"
        url = "/ideas"
        weight = 25
    [[menu.main]]
        identifier = "resume"
        name = "Resume"
        url = "/resume"
        weight = 30
    [[menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search"
        weight = 40
    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
        weight = 50

[outputs]
    home = ["HTML", "RSS", "JSON"]
